<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="violetCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background transparent -->
  <!-- Brain shape nodes and links -->
  <g filter="url(#glow)">
    <!-- Main links -->
    <path d="M 30,50 L 50,30 L 70,50 L 50,70 Z" stroke="url(#violetCyan)" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M 50,30 L 50,70" stroke="url(#violetCyan)" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M 30,50 L 70,50" stroke="url(#violetCyan)" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M 35,35 L 65,65" stroke="url(#violetCyan)" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M 35,65 L 65,35" stroke="url(#violetCyan)" stroke-width="1" fill="none" opacity="0.4"/>
    
    <!-- Outer nodes -->
    <circle cx="50" cy="20" r="5" fill="url(#violetCyan)" />
    <circle cx="20" cy="50" r="5" fill="url(#violetCyan)" />
    <circle cx="80" cy="50" r="5" fill="url(#violetCyan)" />
    <circle cx="50" cy="80" r="5" fill="url(#violetCyan)" />
    
    <!-- Inner nodes -->
    <circle cx="35" cy="35" r="3.5" fill="#06b6d4" />
    <circle cx="65" cy="35" r="3.5" fill="#7c3aed" />
    <circle cx="35" cy="65" r="3.5" fill="#7c3aed" />
    <circle cx="65" cy="65" r="3.5" fill="#06b6d4" />
    
    <!-- Center Synapse -->
    <circle cx="50" cy="50" r="6" fill="#ffffff" />
    <circle cx="50" cy="50" r="3" fill="url(#violetCyan)" />
  </g>
</svg>
